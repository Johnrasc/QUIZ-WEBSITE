<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Books Reviewer Quiz | 2026 Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="bg-animate"></div>

    <div class="quiz-card" id="quiz">
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
        
        <div class="header">
            <span>GREAT BOOKS Reviewer Quiz</span>
            <br>
            <br>
            <span class="badge">Question <span id="q-num">1</span></span>
            <h1 id="question">Loading Question...</h1>
        </div>

        <div class="options-grid" id="options">
            </div>

        <div id="feedback" class="feedback-toast"></div>
    </div>

    <div class="result-card hidden" id="result">
        <div class="icon-box">🏆</div>
        <h2>Quiz Complete!</h2>
        <div class="score-circle">
            <span id="score-val">0</span>
            <small>Score</small>
        </div>

        <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>
        <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2105/2105-preview.mp3" preload="auto"></audio>
        <audio id="snd-tada" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

        <button class="btn-retro" onclick="location.reload()">
            <span>RETRY MISSION</span>
        </button>
        </div>

    <script src="script.js"></script>
</body>

</html>
